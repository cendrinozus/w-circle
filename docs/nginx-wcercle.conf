# Nginx config — Winner's Circle (Docker)
# Montée dans le conteneur via /etc/nginx/conf.d/default.conf

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache long terme pour assets statiques
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Toutes les routes → index.html (SPA / routing client)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sécurité
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs vers stdout/stderr Docker
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
