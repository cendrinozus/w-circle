# Phase 1 — HTTP uniquement (utilisé pendant la provisioning du certificat)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ACME challenge Certbot (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # CRM Agenda — résolution DNS différée (Nginx démarre même sans crm_*)
    resolver 127.0.0.11 valid=10s ipv6=off;

    location = /agenda {
        return 301 /agenda/;
    }

    location /agenda/api/ {
        set $upstream_api http://crm_backend:5000;
        proxy_pass $upstream_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50M;
    }

    location /agenda/ {
        set $upstream_front http://crm_frontend;
        proxy_pass $upstream_front/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    server_tokens off;
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
