# Phase 1 — HTTP uniquement (utilisé pendant la provisioning du certificat)
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ACME challenge Certbot (webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # CRM Agenda — disponible aussi en HTTP (avant HTTPS)
    location = /agenda {
        return 301 /agenda/;
    }

    location /agenda/api/ {
        proxy_pass http://crm_backend:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50M;
    }

    location /agenda/ {
        proxy_pass http://crm_frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    server_tokens off;
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
