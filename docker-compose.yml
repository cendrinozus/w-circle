services:
  web:
    build: .
    container_name: wcercle
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docs/nginx-active.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - default
      - wcercle_net

  certbot:
    image: certbot/certbot
    container_name: wcercle_certbot
    restart: unless-stopped
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renouvellement automatique toutes les 12h
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --quiet --webroot -w /var/www/certbot;
          sleep 12h & wait $${!};
        done"

volumes:
  certbot_webroot:
  certbot_certs:

networks:
  wcercle_net:
    external: true
